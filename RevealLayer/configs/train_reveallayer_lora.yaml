pretrained_model_name_or_path: /path/to/FLUX.1-dev
cfg_path: ./configs/ld_resolution1024_test.py
ckpt_dir: ./ckpts/RevealLayer
train_manifest: ./benchmark/RevealLayerBench.json
data_root: null
output_dir: ./output/reveallayer_lora
logging_dir: logs

resolution: 1024
max_layer: 12
prompt: Decompose the image into foreground and background.

rank: 64
lora_alpha: 64
lora_dropout: 0.0
train_layer_pe: true
train_refiner: true

train_batch_size: 1
gradient_accumulation_steps: 8
max_train_steps: 50000
learning_rate: 1.0
optimizer: prodigy
lr_scheduler: constant
lr_warmup_steps: 0
max_grad_norm: 1.0
mixed_precision: bf16
gradient_checkpointing: true
allow_tf32: true

lambda_alpha: 1.0
lambda_orth: 1.0
enable_alpha_loss: false
enable_orth_loss: false

checkpointing_steps: 2000
checkpoints_total_limit: 5
resume_from_checkpoint: latest
report_to: tensorboard
seed: 42
dataloader_num_workers: 4
